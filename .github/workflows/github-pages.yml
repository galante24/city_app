# Сборка Flutter Web и выкладка на GitHub Pages.
# Repository → Settings → Pages → Source: GitHub Actions.
#
# Secrets (Repository Actions и/или Environment "github-pages"):
#   SUPABASE_URL        — любой из: https://<ref>.supabase.co или …/rest/v1/ из Dashboard (сборка режет до корня в коде через app_secrets).
#   SUPABASE_ANON_KEY   — anon public key (Dashboard → Settings → API)
#
# Корень приложения для gh-pages этого репозитория фиксируем в сборке как /city_app/
# → https://<user>.github.io/city_app/

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Write api_keys.json from secrets (dart-define для web-сборки)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "::error::Пустые secrets: задайте SUPABASE_URL и SUPABASE_ANON_KEY (Actions / Environment github-pages)."
            exit 1
          fi
          jq -n --arg url "$SUPABASE_URL" --arg key "$SUPABASE_ANON_KEY" \
            '{SUPABASE_URL:$url, SUPABASE_ANON_KEY:$key}' > api_keys.json

      - name: Build web (dart-define baked into wasm/js)
        run: |
          flutter build web \
            --release \
            --base-href "/city_app/" \
            --dart-define-from-file=api_keys.json \
            --no-wasm-dry-run

      # Дублируем JSON рядом с index.html: [loadSupabaseRuntimeConfigIfMissing] может подхватить по HTTP,
      # если compile-time define’ы пусты (редкий сценарий / локальная выкладка build/web).
      - name: Copy api_keys.json into web output (runtime fallback)
        run: cp api_keys.json build/web/api_keys.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
