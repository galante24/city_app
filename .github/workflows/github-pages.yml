# Сборка Flutter Web и публикация на GitHub Pages.
# Настройки репозитория: Settings → Pages → Build and deployment → Source: GitHub Actions.
#
# base-href:
#  - обычный репозиторий:  https://USER.github.io/REPO/  →  /REPO/
#  - сайт user.github.io:   https://USER.github.io/      →  /

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve base href
        id: base
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          if [[ "$REPO_NAME" == *.github.io ]]; then
            echo "href=/" >> "$GITHUB_OUTPUT"
            echo "Using base href / (user or org site)"
          else
            echo "href=/${REPO_NAME}/" >> "$GITHUB_OUTPUT"
            echo "Using base href /${REPO_NAME}/"
          fi

      - run: flutter pub get

      - name: Build web
        run: flutter build web --release --base-href "${{ steps.base.outputs.href }}"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
