name: city_app
description: "Lesosibirsk city app."
publish_to: 'none'
version: 1.0.1+7

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  crypto: ^3.0.3
  supabase_flutter: ^2.6.0
  image_picker: ^1.1.2
  video_player: ^2.8.1
  meta: ^1.11.0
  flutter_contacts: ^1.1.8
  share_plus: ^7.2.2
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.2
  http: ^1.2.2
  emoji_picker_flutter: ^4.4.0
  shared_preferences: ^2.5.3
  flutter_local_notifications: ^19.0.0
  file_picker: ^8.1.4
  flutter_secure_storage: ^9.2.4
  path_provider: ^2.1.4
  receive_sharing_intent: ^1.8.1
  intl: ^0.20.2
  open_filex: ^4.7.0
  timeago: ^3.7.1
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  permission_handler: ^12.0.1
  path: ^1.9.0
  dio: ^5.4.0
  sentry_flutter: ^8.11.0
  record: ^5.1.0
  just_audio: ^0.9.40
  uuid: ^4.4.0
  socket_io_client: ^2.0.0
  flutter_slidable: ^3.0.0
  provider: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png
  min_sdk_android: 21
  remove_alpha_ios: true
  # Тёмный фон под вAdaptive icon (значок герба на тёмной подложке)
  adaptive_icon_background: "#1C1C1E"
  adaptive_icon_foreground: assets/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/auth_bg.jpg
    - assets/app_icon.png

dependency_overrides:
  record_linux: 1.3.0
  record_platform_interface: 1.5.0
