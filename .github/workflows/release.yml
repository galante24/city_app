# Полный production: analyze → test (если есть) → подписанный APK (+ опционально AAB) → Artifact + GitHub Release + PATCH app_config в Supabase.
#
# Если также включён push в [.github/workflows/android-ota-deploy.yml], на каждый commit в main пойдут две параллельные сборки — отключите push там или оставьте только один workflow для main.
#
# Секреты:
#   KEYSTORE_BASE64 (или ANDROID_KEYSTORE_BASE64), KEYSTORE_PASSWORD, KEY_PASSWORD, KEY_ALIAS
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
#
name: Production release

on:
  workflow_dispatch:
    inputs:
      force_update_remote:
        description: 'Записать force_update=true в app_config при PATCH'
        type: boolean
        default: false
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: production-release-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve pubspec version
        id: ver
        run: |
          set -euo pipefail
          LINE=$(grep '^version:' pubspec.yaml | head -1)
          FULL=${LINE#version:}
          FULL=$(echo "$FULL" | tr -d ' \r\t')
          NAME="${FULL%%+*}"
          BUILD="${FULL#*+}"
          if [ "$BUILD" = "$FULL" ] || [ -z "$BUILD" ]; then BUILD=0; fi
          SAFE_TAIL=$(echo "${NAME}-b${BUILD}" | tr '+' '-')
          REL_TAG="v${SAFE_TAIL}"
          echo "full=${FULL}" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "code=${BUILD}" >> "$GITHUB_OUTPUT"
          echo "rel_tag=${REL_TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved FULL=${FULL} REL_TAG=${REL_TAG}"

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze

      - name: flutter test
        run: |
          set -euo pipefail
          if [ -d test ] && [ -n "$(find test -name '*_test.dart' -print -quit 2>/dev/null || true)" ]; then
            flutter test
          else
            echo "::notice:: Нет test/*_test.dart — тесты пропущены"
          fi

      - name: Keystore decode (KEYSTORE_BASE64 или ANDROID_KEYSTORE_BASE64)
        env:
          B64_PRIMARY: ${{ secrets.KEYSTORE_BASE64 }}
          B64_FALLBACK: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          B="${B64_PRIMARY:-}"
          if [ -z "$B" ]; then B="${B64_FALLBACK:-}"; fi
          if [ -z "${B:-}" ]; then
            echo "::warning:: Нет секрета KEYSTORE_* — сборка с дефолтной конфигурацией signing в android/"
            exit 0
          fi
          echo "$B" | base64 -d > android/app/ci-release.jks
          chmod 600 android/app/ci-release.jks
          {
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}"
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}"
            echo "keyAlias=${{ secrets.KEY_ALIAS }}"
            echo "storeFile=ci-release.jks"
          } > android/key.properties

      - name: flutter build apk --release
        run: flutter build apk --release

      - name: flutter build appbundle --release (optional)
        continue-on-error: true
        run: flutter build appbundle --release

      - name: SHA-256 (APK)
        id: hash
        run: |
          H=$(sha256sum "build/app/outputs/flutter-apk/app-release.apk" | awk '{print $1}')
          echo "sha=${H}" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: city-app-release-${{ steps.ver.outputs.code }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: city-app-bundle-${{ steps.ver.outputs.code }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 90
          if-no-files-found: warn

      - name: GitHub Release (asset app-release.apk)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.rel_tag }}
          name: ${{ steps.ver.outputs.rel_tag }}
          body: |
            **pubspec:** `${{ steps.ver.outputs.full }}`
            **SHA-256 (APK):** `${{ steps.hash.outputs.sha }}`
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
          make_latest: true
          allowUpdates: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: PATCH Supabase app_config
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          DISPATCH_FORCE: ${{ github.event.inputs.force_update_remote || 'false' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          REPO: ${{ github.repository }}
          REL_TAG: ${{ steps.ver.outputs.rel_tag }}
          CODE: ${{ steps.ver.outputs.code }}
          NAME_ONLY: ${{ steps.ver.outputs.name }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "::notice:: SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY не заданы — пропуск PATCH app_config"
            exit 0
          fi
          ENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "${REL_TAG}")
          APK_DL="https://github.com/${REPO}/releases/download/${ENC}/app-release.apk"
          FORCE_JSON=false
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            case "${DISPATCH_FORCE}" in true|True|"true") FORCE_JSON=true ;; esac
          fi
          BODY=$(FORCE_JSON="$FORCE_JSON" CODE="$CODE" NAME_ONLY="$NAME_ONLY" APK_DL="$APK_DL" python3 << 'PY'
          import json, os
          fg = os.environ["FORCE_JSON"].lower() == "true"
          print(json.dumps({
            "version_code": int(os.environ["CODE"]),
            "version": os.environ["NAME_ONLY"],
            "apk_url": os.environ["APK_DL"],
            "download_url": os.environ["APK_DL"],
            "force_update": fg,
          }))
          PY
          )
          curl -fsS -X PATCH "${SUPABASE_URL}/rest/v1/app_config?id=eq.default" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "${BODY}"
          echo
          echo "Supabase app_config обновлён."
