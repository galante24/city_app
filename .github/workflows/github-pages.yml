# Сборка Flutter Web и выкладка на GitHub Pages.
# Repository → Settings → Pages → Source: GitHub Actions.
#
# Secrets (Repository Actions и/или Environment "github-pages"):
#   SUPABASE_URL        — https://<ref>.supabase.co или …/rest/v1/ из Dashboard (клиент обрежет хвост).
#   SUPABASE_ANON_KEY   — anon public key (Dashboard → Settings → API)
#
# Ключи в бандл: два флага --dart-define=… из env (секреты шага). При проблемах с
# кавычками в значениях можно заменить на jq + --dart-define-from-file=dart_defines.json.
#
# Корень приложения: /city_app/ → https://<user>.github.io/city_app/

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build web (Supabase из secrets → --dart-define)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "::error::Пустые secrets: задайте SUPABASE_URL и SUPABASE_ANON_KEY (Repository / Environment github-pages)."
            exit 1
          fi
          flutter build web \
            --release \
            --base-href "/city_app/" \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --no-wasm-dry-run
          jq -n --arg url "$SUPABASE_URL" --arg key "$SUPABASE_ANON_KEY" \
            '{SUPABASE_URL:$url, SUPABASE_ANON_KEY:$key}' > build/web/api_keys.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
