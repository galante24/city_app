# Сборка Flutter Web и публикация на GitHub Pages.
# Настройки репозитория: Settings → Pages → Build and deployment → Source: GitHub Actions.
#
# Обязательные secrets:
# - предпочтительно Repository secrets:
#     Settings → Secrets and variables → Actions → Repository secrets
#       SUPABASE_URL, SUPABASE_ANON_KEY
#   либо Environment secrets для среды "github-pages" — тогда они подхватятся
#   благодаря environment.name ниже в job build.
#
# base-href:
#  - обычный репозиторий:  https://USER.github.io/REPO/  →  /REPO/
#  - сайт user.github.io:   https://USER.github.io/      →  /

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      # Чтобы брались и Repository secrets, и secrets среды github-pages (Pages).
      name: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve base href
        id: base
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          if [[ "$REPO_NAME" == *.github.io ]]; then
            echo "href=/" >> "$GITHUB_OUTPUT"
            echo "Using base href / (user or org site)"
          else
            echo "href=/${REPO_NAME}/" >> "$GITHUB_OUTPUT"
            echo "Using base href /${REPO_NAME}/"
          fi

      - run: flutter pub get

      # В CI api_keys.json в репозитории отсутствует (.gitignore) — восстанавливаем из секретов.
      - name: Write api_keys.json from secrets (Supabase defines)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Add repository Actions secrets SUPABASE_URL and SUPABASE_ANON_KEY."
            exit 1
          fi
          jq -n --arg url "$SUPABASE_URL" --arg key "$SUPABASE_ANON_KEY" \
            '{SUPABASE_URL:$url, SUPABASE_ANON_KEY:$key}' > api_keys.json

      - name: Build web
        run: |
          flutter build web --release \
            --base-href "${{ steps.base.outputs.href }}" \
            --dart-define-from-file=api_keys.json \
            --no-wasm-dry-run

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
